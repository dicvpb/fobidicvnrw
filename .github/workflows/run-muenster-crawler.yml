name: Run NRW Crawlers (parallel) + Commit Results

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-crawlers:
    name: Run ${{ matrix.city }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        city: [muenster, koeln, aachen, essen, paderborn]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Run crawler
        run: npm run crawl:${{ matrix.city }}

      # Speichere erzeugte JSON(s) als Artifact, damit ein anderer Job sie committen kann
      - name: Upload JSON artifact
        uses: actions/upload-artifact@v4
        with:
          name: json-${{ matrix.city }}
          path: |
            *.json
          if-no-files-found: error

  commit-results:
    name: Commit all JSON results
    runs-on: ubuntu-latest
    needs: run-crawlers

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Alle Artifacts herunterladen
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: _artifacts

      - name: Move JSON files into repo root
        run: |
          shopt -s globstar nullglob
          cp -v _artifacts/**/*.json . || true
          ls -la *.json || true

      - name: Commit and push results
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add *.json
          git commit -m "Update crawler results (all cities)" || echo "No changes"
          git push
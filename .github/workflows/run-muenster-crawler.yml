name: Run NRW Crawler

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  crawler-muenster:
    name: Crawler Münster
    runs-on: ubuntu-latest

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Node.js installieren
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Abhängigkeiten installieren
        run: npm install

      - name: Münster-Crawler ausführen
        run: npm run crawl:muenster

      - name: Münster-Ergebnis committen
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add kurse-muenster.json
          git commit -m "Update kurse-muenster.json" || echo "Keine Änderungen"
          git push

  crawler-koeln:
    name: Crawler Köln
    runs-on: ubuntu-latest

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Node.js installieren
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Abhängigkeiten installieren
        run: npm install

      - name: Köln-Crawler ausführen
        run: npm run crawl:koeln

      - name: Köln-Ergebnis committen
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add kurse-koeln.json
          git commit -m "Update kurse-koeln.json" || echo "Keine Änderungen"
          git push
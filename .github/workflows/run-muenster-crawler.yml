name: Run NRW Crawlers (parallel) + Commit Results

on:
  schedule:
    - cron: '00 20 * * *'   # täglich 06:15 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-crawlers:
    name: Run ${{ matrix.city }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        city: [muenster, koeln, aachen, essen, paderborn]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TLS/Cert Diagnose (Essen + Aachen)
        if: matrix.city == 'essen' || matrix.city == 'aachen'
        shell: bash
        run: |
          set +e

          # City-spezifische Ziele
          if [ "${{ matrix.city }}" = "essen" ]; then
            HOST="www.caritas-essen.de"
            URL="https://www.caritas-essen.de/berufe/fort-weiterbildungsboerse"
          else
            HOST="www.caritas-ac.de"
            URL="https://www.caritas-ac.de/fort-und-weiterbildung/fortbildung/fortbildung-liste.aspx"
          fi

          OUT="tls-debug-${{ matrix.city }}.txt"

          echo "== System ==" | tee "$OUT"
          uname -a | tee -a "$OUT"
          node -v | tee -a "$OUT"
          openssl version | tee -a "$OUT"
          echo "" | tee -a "$OUT"

          echo "== Target ==" | tee -a "$OUT"
          echo "CITY=${{ matrix.city }}" | tee -a "$OUT"
          echo "HOST=${HOST}" | tee -a "$OUT"
          echo "URL=${URL}" | tee -a "$OUT"
          echo "" | tee -a "$OUT"

          echo "== DNS/Connection check ==" | tee -a "$OUT"
          getent hosts "$HOST" | tee -a "$OUT"
          echo "" | tee -a "$OUT"

          echo "== openssl s_client (showcerts) ==" | tee -a "$OUT"
          echo | openssl s_client -connect "${HOST}:443" -servername "$HOST" -showcerts 2>&1 | tee -a "$OUT"
          echo "" | tee -a "$OUT"

          echo "== openssl verify ==" | tee -a "$OUT"
          echo | openssl s_client -connect "${HOST}:443" -servername "$HOST" -showcerts 2>/dev/null \
            | openssl verify -verbose 2>&1 | tee -a "$OUT"
          echo "" | tee -a "$OUT"

          echo "== curl -Iv (HEAD) ==" | tee -a "$OUT"
          curl -Iv "$URL" 2>&1 | tee -a "$OUT"

          echo "TLS debug finished (non-fatal)."
          exit 0

      - name: Upload TLS debug artifact (Essen + Aachen)
        if: matrix.city == 'essen' || matrix.city == 'aachen'
        uses: actions/upload-artifact@v4
        with:
          name: tls-debug-${{ matrix.city }}
          path: tls-debug-${{ matrix.city }}.txt
          if-no-files-found: warn

      - name: Run crawler
        run: npm run crawl:${{ matrix.city }}

      - name: Check output exists
        run: |
          test -f "kurse-${{ matrix.city }}.json"
          ls -la "kurse-${{ matrix.city }}.json"

      - name: Upload result artifact
        uses: actions/upload-artifact@v4
        with:
          name: json-${{ matrix.city }}
          path: kurse-${{ matrix.city }}.json
          if-no-files-found: error

  commit-results:
    name: Commit all JSON results
    runs-on: ubuntu-latest
    needs: run-crawlers
    if: always()

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: _artifacts

      - name: Copy results (only if present)
        run: |
          for city in muenster koeln aachen essen paderborn; do
            src="_artifacts/json-${city}/kurse-${city}.json"
            if [ -f "$src" ]; then
              cp -v "$src" "./kurse-${city}.json"
            else
              echo "⚠️ Kein Ergebnis für ${city} (Job/Artifact fehlgeschlagen)"
            fi
          done

      - name: Commit and push results
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add kurse-*.json
          git commit -m "Update crawler results (all cities)" || echo "No changes"
          git push
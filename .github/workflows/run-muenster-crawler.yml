
name: Run NRW Crawlers (parallel) + Commit Results

on:
  schedule:
    - cron: '10 1 * * *'   # täglich 06:15 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-crawlers:
    name: Run ${{ matrix.city }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        city: [muenster, koeln, aachen, essen, paderborn]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TLS/Cert Diagnose (nur Essen)
        if: matrix.city == 'essen'
        shell: bash
        run: |
          set +e
          echo "== System ==" | tee tls-debug-${{ matrix.city }}.txt
          uname -a | tee -a tls-debug-${{ matrix.city }}.txt
          node -v | tee -a tls-debug-${{ matrix.city }}.txt
          openssl version | tee -a tls-debug-${{ matrix.city }}.txt
          echo "" | tee -a tls-debug-${{ matrix.city }}.txt

          echo "== DNS/Connection check ==" | tee -a tls-debug-${{ matrix.city }}.txt
          getent hosts www.caritas-essen.de | tee -a tls-debug-${{ matrix.city }}.txt
          echo "" | tee -a tls-debug-${{ matrix.city }}.txt

          echo "== openssl s_client (showcerts) ==" | tee -a tls-debug-${{ matrix.city }}.txt
          echo | openssl s_client -connect www.caritas-essen.de:443 -servername www.caritas-essen.de -showcerts \
            2>&1 | tee -a tls-debug-${{ matrix.city }}.txt
          echo "" | tee -a tls-debug-${{ matrix.city }}.txt

          echo "== openssl verify ==" | tee -a tls-debug-${{ matrix.city }}.txt
          echo | openssl s_client -connect www.caritas-essen.de:443 -servername www.caritas-essen.de -showcerts 2>/dev/null \
            | openssl verify -verbose 2>&1 | tee -a tls-debug-${{ matrix.city }}.txt
          echo "" | tee -a tls-debug-${{ matrix.city }}.txt

          echo "== curl -Iv (HEAD) ==" | tee -a tls-debug-${{ matrix.city }}.txt
          curl -Iv https://www.caritas-essen.de/berufe/fort-weiterbildungsboerse 2>&1 | tee -a tls-debug-${{ matrix.city }}.txt

          echo "TLS debug finished (non-fatal)."
          exit 0

      - name: Upload TLS debug artifact (nur Essen)
        if: matrix.city == 'essen'
        uses: actions/upload-artifact@v4
        with:
          name: tls-debug-${{ matrix.city }}
          path: tls-debug-${{ matrix.city }}.txt
          if-no-files-found: warn

      - name: Run crawler
        run: npm run crawl:${{ matrix.city }}

      - name: Check output exists
        run: |
          test -f "kurse-${{ matrix.city }}.json"
          ls -la "kurse-${{ matrix.city }}.json"

      - name: Upload result artifact
        uses: actions/upload-artifact@v4
        with:
          name: json-${{ matrix.city }}
          path: kurse-${{ matrix.city }}.json
          if-no-files-found: error

  commit-results:
    name: Commit all JSON results
    runs-on: ubuntu-latest
    needs: run-crawlers
    if: always()

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: _artifacts

      - name: Copy results (only if present)
        run: |
          for city in muenster koeln aachen essen paderborn; do
            src="_artifacts/json-${city}/kurse-${city}.json"
            if [ -f "$src" ]; then
              cp -v "$src" "./kurse-${city}.json"
            else
              echo "⚠️ Kein Ergebnis für ${city} (Job/Artifact fehlgeschlagen)"
            fi
          done

      - name: Commit and push results
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add kurse-*.json
          git commit -m "Update crawler results (all cities)" || echo "No changes"
          git push
